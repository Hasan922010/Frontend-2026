<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ro'yxatdan o'tish</title>
</head>

<body>
    <h1>HTML Kursini-- Ro'yxatdan o'tish</h1>
    <form action="ro'yxatdan_otish.html" method="post">
        <p><label for="ism">Ismingiz:</label>
            <br>
            <input type="text" name="ism" id="ism" placeholder="Ismingizni kiriting" required>
        </p>
        <p>
            <label for="familiya">Familiyangiz:</label>
            <br>
            <input type="text" name="familiya" id="familiya" placeholder="Familiyangizni kiriting" required>
        </p>
        <p>
            <label for="email">Email:</label>
            <br>
            <input type="email" name="email" id="email" placeholder="Email manzilingizni kiriting" required>

        </p>
        <p>
            <label for="tel">Telefon:</label>
            <br>
            <input type="tel" name="tel" id="tel" placeholder="+998 90 123 45 67" required>
        </p>
        <p>
            <label for="yosh">Yoshingiz:</label>
            <br>
            <input type="number" name="yosh" id="yosh" placeholder="Yoshingizni kiriting" min="14" max="60" required>

        </p>
        <p>
            <label for="tajriba">Tajriba:</label>
            <br>
            <textarea name="tajriba" id="tajriba" placeholder="Tajribangizni kiriting" rows="3"></textarea>
        </p>
        <p>
            <label for="tug-kun">Tug'ilgan kun:</label>
            <br>
            <input type="date" name="tug-kun" id="tug-kun" required>
        </p>
        
        <p>
            <input type="submit" value="Ro'yxatdan o'tish">
            <input type="reset" value="Tozalash">

        </p>
    </form>
</body>

</html>
