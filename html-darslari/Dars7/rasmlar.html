<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rasmlar darsi</title>
  </head>
  <body>
    <h1>Rasmlar darsi</h1>
    <hr />
    <!-- internetdan rasm  -->
    <h2>Internetdan rasm</h2>
    <p>
      <img src="https://picsum.photos/400/250" alt="Tabiat rasmi" width="400" />
    </p>
    <hr />
    <!-- Kichkina rasm  -->
    <h2>Kichik rasm</h2>
    <p>
      <img
        src="https://picsum.photos/150/150"
        alt="Kichik tabiat rasmi"
        width="200"
      />
    </p>
    <hr />
    <!-- Bosilganda rasm -->

    <p>
      <a href="https://picsum.photos/400/250" target="_blank"
        ><img src="https://picsum.photos/400/250" alt="Bosing" width="300"
      /></a>
    </p>
    <p><em> Rasmni bosilganda-yangi tabda rasm ochiladi</em></p>
    <hr />
    <!-- Alt matn sinovi -->
    <p>
      <img src="mavjud-emas.jpg" alt="Bu rasm topilmadi -alt matn ko'rinadi" />
    </p>
    <hr />
    <!-- Bir nechta rasm -->

    <p>
      <img src="https://picsum.photos/200/150" alt="Rasm 1" width="200" />
      <img src="https://picsum.photos/200/150" alt="Rasm 2" width="200" />
      <img src="https://picsum.photos/200/150" alt="Rasm 3" width="200" />
    </p>
    <hr />
    <!-- Rasm va tavsif -->
    <picture>
      <img src="https://picsum.photos/400/450" alt="Rasm 1" width="200" />
      <figcaption>Rasm 1 tavsifi</figcaption>
    </picture>
  </body>
</html>
